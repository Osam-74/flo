<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Manifest uses relative path so it works on both Vercel (/) and GitHub Pages (/flo/) -->
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="./icons/icon-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <meta name="theme-color" content="#1A2FA8" />
    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FloHQ" />
    <title>FloHQ</title>
    <meta name="description" content="Farm expense tracker" />
    <meta name="robots" content="noindex, nofollow" />
    <!-- iOS splash — force icon-only, no label text below icon -->
    <meta name="mobile-web-app-capable" content="yes" />
    <style>
      html, body { height: 100%; margin: 0; }
      #root { height: 100%; }
    </style>
  
    <!-- SW Kill Switch: runs before React, unregisters zombie SWs + clears stale caches -->
    <script>
      (function() {
        if (!('serviceWorker' in navigator)) return;
        // Check if we need to nuke everything
        var CLEAN_VERSION = 'flo-clean-v2';
        var alreadyCleaned = localStorage.getItem(CLEAN_VERSION);
        if (alreadyCleaned) return; // already ran this cleanup
        
        // Mark as cleaned immediately to avoid repeated nukes
        try { localStorage.setItem(CLEAN_VERSION, '1'); } catch(e) {}
        
        // Unregister ALL service workers
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(reg) { reg.unregister(); });
        });
        
        // Clear ALL caches
        if ('caches' in window) {
          caches.keys().then(function(keys) {
            keys.forEach(function(key) { caches.delete(key); });
          });
        }
        
        // Force a fresh reload ONCE if we had any registrations
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          if (regs.length > 0) {
            // Give unregister time to complete, then reload
            setTimeout(function() { window.location.reload(); }, 500);
          }
        });
      })();
    </script>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
