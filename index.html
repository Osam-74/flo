<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Manifest uses relative path so it works on both Vercel (/) and GitHub Pages (/flo/) -->
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="./icons/icon-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <meta name="theme-color" content="#1A2FA8" />
    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FloHQ" />
    <title>FloHQ</title>
    <meta name="description" content="Farm expense tracker" />
    <meta name="robots" content="noindex, nofollow" />
    <!-- iOS splash — force icon-only, no label text below icon -->
    <meta name="mobile-web-app-capable" content="yes" />
    <style>
      html, body { height: 100%; margin: 0; }
      #root { height: 100%; }
    </style>
  
    <!-- SW Kill Switch v10: force-unregister ALL service workers + clear ALL caches -->
    <!-- This is the ONLY reliable way to break out of a stale SW loop on mobile PWAs -->
    <script>
      (function() {
        if (!('serviceWorker' in navigator)) return;
        var CLEAN_KEY = 'flo-sw-v11';
        if (localStorage.getItem(CLEAN_KEY)) {
          // Already cleaned for this version — just clear any non-v10 caches
          if ('caches' in window) {
            caches.keys().then(function(keys) {
              keys.forEach(function(k) { if (k !== 'flohq-v10') caches.delete(k); });
            });
          }
          return;
        }
        // Full nuke: unregister ALL service workers + delete ALL caches
        if ('caches' in window) {
          caches.keys().then(function(keys) {
            keys.forEach(function(k) { caches.delete(k); });
          });
        }
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          if (!regs.length) {
            try { localStorage.setItem(CLEAN_KEY, '1'); } catch(e) {}
            return;
          }
          Promise.all(regs.map(function(r) { return r.unregister(); })).then(function() {
            try { localStorage.setItem(CLEAN_KEY, '1'); } catch(e) {}
            // Reload once to get fresh page without any SW intercepting
            window.location.reload();
          });
        });
      })();
    </script>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
